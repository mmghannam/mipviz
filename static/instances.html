                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg class="icon-auto" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            </button>
        </div>
    </header>

    <main>
        <section class="bank-section">
            <div class="bank-header">
                <h2>Instance Bank</h2>
                <span id="bank-count" class="bank-count"></span>
            </div>
            <input type="text" id="bank-search" class="library-search" placeholder="Search instances… (s)" autocomplete="off">
            <div class="bank-filters" id="bank-filters">
                <span class="sort-label">Collection</span>
                <button class="filter-btn active" data-filter="all">All</button>
            </div>
            <div class="bank-filters" id="tag-filters">
                <span class="sort-label">Tag</span>
                <button class="tag-filter-btn active" data-tag="all">All</button>
            </div>
            <div class="bank-filters" id="cons-type-filters">
                <span class="sort-label">Constraint type</span>
                <button class="cons-type-btn active" data-cons-type="all">All</button>
            </div>
            <div class="bank-table-wrap">
                <table class="bank-table">
                    <thead>
                        <tr>
                            <th class="col-name sortable active" data-sort="name">Name<span class="sort-indicator"> ▲</span></th>
                            <th class="col-num sortable" data-sort="num_vars">Variables<span class="sort-indicator"></span></th>
                            <th class="col-num sortable" data-sort="num_constraints">Constraints<span class="sort-indicator"></span></th>
                            <th class="col-num sortable" data-sort="num_nonzeros">Nonzeros<span class="sort-indicator"></span></th>
                            <th class="col-num sortable" data-sort="num_continuous">Cont.<span class="sort-indicator"></span></th>
                            <th class="col-num sortable" data-sort="num_integer">Int.<span class="sort-indicator"></span></th>
                            <th class="col-num sortable" data-sort="num_binary">Bin.<span class="sort-indicator"></span></th>
                            <th class="col-num col-cons-type sortable hidden" data-sort="cons_type" id="col-cons-type-header"></th>
                            <th class="col-tags sortable" data-sort="status">Status<span class="sort-indicator"></span></th>
                            <th class="col-tags">Tags</th>
                            <th class="col-tags">Collections</th>
                        </tr>
                    </thead>
                    <tbody id="bank-body"></tbody>
                </table>
            </div>
            <div id="bank-status" class="bank-status">Loading instance data…</div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <span class="footer-developed">Developed by <a href="https://github.com/mmghannam/mipviz" target="_blank" rel="noopener" class="footer-link"><svg class="footer-icon" width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>Mohammed Ghannam</a> with <a href="https://claude.ai" target="_blank" rel="noopener" class="footer-link"><img src="./claude-logo.png?v=2" alt="Claude" class="claude-logo"></a></span>
            <span class="footer-powered">Powered by <a href="https://www.scipopt.org" target="_blank" rel="noopener" title="SCIP"><img src="./scip-logo-light.svg" alt="SCIP" class="footer-logo scip-dark" width="20" height="20"><img src="./scip-logo-blue.svg" alt="SCIP" class="footer-logo scip-light" width="20" height="20"></a> &amp; <a href="https://highs.dev" target="_blank" rel="noopener" title="HiGHS"><img src="./highs-logo.png?v=2" alt="HiGHS" class="footer-logo" width="20" height="20"></a></span>
        </div>
    </footer>

    <script src="./theme.js?v=1"></script>
    <script>
    const bankBody = document.getElementById('bank-body');
    const bankSearch = document.getElementById('bank-search');
    const bankCount = document.getElementById('bank-count');
    const bankStatus = document.getElementById('bank-status');

    let allStats = [];
    let collections = {};
    let miplibMeta = {}; // name -> { tags, status, objective, ... }
    let miplibDetails = {}; // name -> { statistics: { constraints: { <Type>: { original, presolved }}}}
    let consTypeCounts = {}; // name -> { <Type>: <count> }
    let currentSort = 'name';
    let sortAsc = true;
    let currentFilter = 'all';
    let currentTag = 'all';
    let currentConsType = 'all';

    function formatNum(n) {
        return n.toLocaleString();
    }

    // Deterministic color from collection name using a string hash -> HSL
    function collectionColor(name) {
        let hash = 0;
        for (let i = 0; i < name.length; i++) {
            hash = name.charCodeAt(i) + ((hash << 5) - hash);
            hash = hash & hash; // Convert to 32-bit integer
        }
        const hue = ((hash % 360) + 360) % 360;
        return 'hsl(' + hue + ', 70%, 65%)';
    }

    function tagToggle(n) {
        if (n === 0) return '';
        return '<button class="tag-cell-toggle" type="button" data-count="' + n + '">' + n + '<span class="tag-cell-chevron"> ▾</span></button>';
    }

    function renderTags(name) {
        const tags = collections[name] || [];
        return tags.map(t => {
            const color = collectionColor(t);
            return '<span class="collection-tag" data-tag="' + t + '" style="color:' + color + ';border-color:' + color + '">' + t.replace(/_/g, ' ') + '</span>';
        }).join(' ');
    }

    function renderTagsCell(name) {
        const n = (collections[name] || []).length;
        return '<div class="tag-cell collapsed">' +
               tagToggle(n) +
               '<span class="tag-cell-inline">' + renderTags(name) + '</span>' +
               '</div>';
    }

    function instanceHref(name) {
        return './index.html#instance=' + encodeURIComponent(name);
    }

    function renderStatus(name) {
        const meta = miplibMeta[name];
        if (!meta || !meta.status) return '';
        const s = meta.status;
        const cls = s === 'easy' ? 'status-easy' : s === 'hard' ? 'status-hard' : 'status-open';
        return '<span class="instance-status ' + cls + '">' + s + '</span>';
    }

    function renderMiplibTags(name) {
        const meta = miplibMeta[name];
        if (!meta || !meta.tags) return '';
        // Filter out meta-tags (benchmark, benchmark_suitable, easy, hard, open)
        const skip = new Set(['benchmark', 'benchmark_suitable', 'easy', 'hard', 'open', 'no_solution']);
        const tags = meta.tags.filter(t => !skip.has(t));
        return tags.map(t => {
            const color = collectionColor('miplib_' + t);
            return '<span class="miplib-tag" data-tag="' + t + '" style="color:' + color + ';border-color:' + color + '">' + t.replace(/_/g, ' ') + '</span>';
        }).join(' ');
    }

    function renderMiplibTagsCell(name) {
        const meta = miplibMeta[name];
        const skip = new Set(['benchmark', 'benchmark_suitable', 'easy', 'hard', 'open', 'no_solution']);
        const n = (meta && meta.tags) ? meta.tags.filter(t => !skip.has(t)).length : 0;
        return '<div class="tag-cell collapsed">' +
               tagToggle(n) +
               '<span class="tag-cell-inline">' + renderMiplibTags(name) + '</span>' +
               '</div>';
    }

    function consTypeCount(name, type) {
        const counts = consTypeCounts[name];
        if (!counts) return null;
        return counts[type] || 0;
    }

    function renderTable(data) {
        bankBody.innerHTML = '';
        const showConsCol = currentConsType !== 'all';
        for (const s of data) {
            const tr = document.createElement('tr');
            let consCell = '';
            if (showConsCol) {
                const c = consTypeCount(s.name, currentConsType);
                const txt = c === null ? '—' : formatNum(c);
                consCell = '<td class="col-num col-cons-type">' + txt + '</td>';
            }
            tr.innerHTML =
                '<td class="col-name"><a href="' + instanceHref(s.name) + '">' + s.name + '</a></td>' +
                '<td class="col-num">' + formatNum(s.num_vars) + '</td>' +
                '<td class="col-num">' + formatNum(s.num_constraints) + '</td>' +
                '<td class="col-num">' + formatNum(s.num_nonzeros) + '</td>' +
                '<td class="col-num">' + formatNum(s.num_continuous) + '</td>' +
                '<td class="col-num">' + formatNum(s.num_integer) + '</td>' +
                '<td class="col-num">' + formatNum(s.num_binary) + '</td>' +
                consCell +
                '<td class="col-tags">' + renderStatus(s.name) + '</td>' +
                '<td class="col-tags">' + renderMiplibTagsCell(s.name) + '</td>' +
                '<td class="col-tags">' + renderTagsCell(s.name) + '</td>';
            bankBody.appendChild(tr);
        }
        bankCount.textContent = data.length + ' instances';
    }

    const STATUS_RANK = { easy: 0, hard: 1, open: 2 };
    function statusRank(name) {
        const meta = miplibMeta[name];
        const s = meta && meta.status;
        return s && STATUS_RANK[s] !== undefined ? STATUS_RANK[s] : 3;
    }

    function sortData(data, key, asc) {
        if (key === 'status') {
            return data.slice().sort((a, b) => {
                const ra = statusRank(a.name);
                const rb = statusRank(b.name);
                if (ra !== rb) return asc ? ra - rb : rb - ra;
                return a.name.localeCompare(b.name);
            });
        }
        if (key === 'cons_type' && currentConsType !== 'all') {
            const t = currentConsType;
            return data.slice().sort((a, b) => {
                const ca = consTypeCount(a.name, t);
                const cb = consTypeCount(b.name, t);
                // Nulls (no detail data) go to the bottom regardless of direction
                if (ca === null && cb === null) return a.name.localeCompare(b.name);
                if (ca === null) return 1;
                if (cb === null) return -1;
                return asc ? ca - cb : cb - ca;
            });
        }
        return data.slice().sort((a, b) => {
            if (key === 'name') {
                return asc ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name);
            }
            return asc ? a[key] - b[key] : b[key] - a[key];
        });
    }

    function applyFilter() {
        const q = bankSearch.value.toLowerCase();
        let filtered = allStats;
        if (currentFilter !== 'all') {
            filtered = filtered.filter(s => (collections[s.name] || []).includes(currentFilter));
        }
        if (currentTag !== 'all') {
            const skip = new Set(['benchmark', 'benchmark_suitable', 'easy', 'hard', 'open', 'no_solution']);
            filtered = filtered.filter(s => {
                const meta = miplibMeta[s.name];
                if (!meta || !meta.tags) return false;
                return meta.tags.filter(t => !skip.has(t)).includes(currentTag);
            });
        }
        if (q) {
            filtered = filtered.filter(s => s.name.toLowerCase().includes(q));
        }
        filtered = sortData(filtered, currentSort, sortAsc);
        renderTable(filtered);
    }

    // Click-to-sort on table headers.
    function updateSortIndicators() {
        document.querySelectorAll('th.sortable').forEach(th => {
            const key = th.dataset.sort;
            let isActive;
            if (key === 'cons_type') {
                isActive = currentSort === 'cons_type' && currentConsType !== 'all';
            } else {
                isActive = key === currentSort && currentConsType === 'all';
            }
            th.classList.toggle('active', isActive);
            const ind = th.querySelector('.sort-indicator');
            if (ind) ind.textContent = isActive ? (sortAsc ? ' ▲' : ' ▼') : '';
        });
    }

    document.querySelectorAll('th.sortable').forEach(th => {
        th.addEventListener('click', () => {
            const key = th.dataset.sort;
            // Clicking the cons-type header just toggles asc/desc; it only sorts when a
            // type pill is active (otherwise the column is hidden anyway).
            if (key === 'cons_type') {
                if (currentConsType === 'all') return;
                sortAsc = !sortAsc;
                currentSort = 'cons_type';
                updateSortIndicators();
                applyFilter();
                return;
            }
            if (currentSort === key && currentConsType === 'all') {
                sortAsc = !sortAsc;
            } else {
                currentSort = key;
                sortAsc = key === 'name';
            }
            // Clicking a normal sort column deactivates the cons-type pill/column.
            if (currentConsType !== 'all') {
                currentConsType = 'all';
                document.querySelectorAll('.cons-type-btn').forEach(b => {
                    b.classList.toggle('active', b.dataset.consType === 'all');
                });
                updateConsTypeColumn();
            }
            updateSortIndicators();
            applyFilter();
        });
    });

    bankSearch.addEventListener('input', applyFilter);

    document.addEventListener('keydown', function(e) {
        if (e.key === 's' && !e.ctrlKey && !e.metaKey && !e.altKey) {
            var tag = document.activeElement && document.activeElement.tagName;
            if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
            e.preventDefault();
            bankSearch.focus();
        }
    });

    bankBody.addEventListener('click', (e) => {
        const toggle = e.target.closest('.tag-cell-toggle');
        if (toggle) {
            const cell = toggle.closest('.tag-cell');
            if (cell) {
                const isCollapsed = cell.classList.toggle('collapsed');
                const chev = toggle.querySelector('.tag-cell-chevron');
                if (chev) chev.textContent = isCollapsed ? ' ▾' : ' ▴';
            }
            return;
        }
        if (e.target.classList.contains('collection-tag')) {
            const tag = e.target.dataset.tag;
            currentFilter = tag;
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.filter === tag);
            });
            applyFilter();
        }
        if (e.target.classList.contains('miplib-tag')) {
            const tag = e.target.dataset.tag;
            currentTag = tag;
            document.querySelectorAll('.tag-filter-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.tag === tag);
            });
            applyFilter();
        }
    });

    // Collection filter buttons
    function setupFilterButtons() {
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentFilter = btn.dataset.filter;
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                applyFilter();
            });
        });
    }

    // Tag filter buttons
    function setupTagFilterButtons() {
        document.querySelectorAll('.tag-filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentTag = btn.dataset.tag;
                document.querySelectorAll('.tag-filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                applyFilter();
            });
        });
    }

    // Constraint-type sort pills: selecting one reveals a column with per-instance
    // counts of that type and sorts instances by that count descending.
    function updateConsTypeColumn() {
        const header = document.getElementById('col-cons-type-header');
        if (currentConsType === 'all') {
            header.classList.add('hidden');
            header.textContent = '';
        } else {
            header.classList.remove('hidden');
            let total = 0;
            Object.keys(consTypeCounts).forEach(n => {
                total += (consTypeCounts[n][currentConsType] || 0);
            });
            header.innerHTML = currentConsType +
                ' <span class="cons-type-count">' + formatNum(total) + '</span>' +
                '<span class="sort-indicator"></span>';
        }
    }

    function setupConsTypeButtons() {
        document.querySelectorAll('.cons-type-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const type = btn.dataset.consType;
                currentConsType = type;
                document.querySelectorAll('.cons-type-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                if (type === 'all') {
                    // Fall back to name sort if we were sorting by cons_type.
                    if (currentSort === 'cons_type') {
                        currentSort = 'name';
                        sortAsc = true;
                    }
                } else {
                    currentSort = 'cons_type';
                    sortAsc = false; // descending by count
                }
                updateConsTypeColumn();
                updateSortIndicators();
                applyFilter();
            });
        });
    }

    // Load data
    const INSTANCE_REPO = 'https://raw.githubusercontent.com/mmghannam/mipviz-instances/main/';
    const GITHUB_API_URL = 'https://api.github.com/repos/mmghannam/mipviz-instances/contents/collections';

    Promise.all([
        fetch(INSTANCE_REPO + 'instance-stats.json').then(r => r.json()),
        fetch(GITHUB_API_URL).then(r => r.json()),
        fetch(INSTANCE_REPO + 'miplib-metadata.json').then(r => r.json()).catch(() => []),
        fetch(INSTANCE_REPO + 'miplib-details.json').then(r => r.json()).catch(() => ({})),
    ])
    .then(([stats, collectionFiles, miplibData, detailsData]) => {
        allStats = stats;
        // Build miplib metadata lookup
        miplibMeta = {};
        miplibData.forEach(m => { miplibMeta[m.name] = m; });

        // Build per-instance constraint-type count table from miplib-details.
        // Use the "original" values and skip meta-rows like "Total".
        miplibDetails = detailsData || {};
        consTypeCounts = {};
        const SKIP_CONS = new Set(['Total']);
        Object.keys(miplibDetails).forEach(name => {
            const cons = miplibDetails[name] && miplibDetails[name].statistics && miplibDetails[name].statistics.constraints;
            if (!cons) return;
            const counts = {};
            Object.keys(cons).forEach(type => {
                if (SKIP_CONS.has(type)) return;
                const raw = cons[type] && cons[type].original;
                const v = raw == null ? 0 : Number(raw);
                if (Number.isFinite(v)) counts[type] = v;
            });
            consTypeCounts[name] = counts;
        });

        // --- Defensive check for API rate limit ---
        if (!Array.isArray(collectionFiles)) {
            let errorMsg = 'Failed to load collection list from GitHub.';
            if (collectionFiles.message && collectionFiles.message.includes("API rate limit exceeded")) {
                errorMsg = 'GitHub API rate limit exceeded. Please wait a bit and try again.';
            }
            throw new Error(errorMsg);
        }
        // --- End defensive check ---

        const collectionPromises = collectionFiles
            .filter(f => f.name.endsWith('.txt'))
            .map(f => fetch(f.download_url).then(r => r.text().then(text => ({
                name: f.name.replace('.txt', ''),
                instances: text.trim().split('\n')
            }))));
        
        return Promise.all(collectionPromises);
    })
    .then(collectionData => {
        // Build the inverted 'collections' object: { instanceName: [collection1, collection2] }
        collections = {};
        collectionData.forEach(collection => {
            collection.instances.forEach(instanceName => {
                if (!collections[instanceName]) {
                    collections[instanceName] = [];
                }
                collections[instanceName].push(collection.name);
            });
        });

        // Dynamically create filter buttons
        const filtersContainer = document.getElementById('bank-filters');
        collectionData.sort((a,b) => a.name.localeCompare(b.name)).forEach(collection => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn';
            btn.dataset.filter = collection.name;
            btn.textContent = collection.name.replace(/_/g, ' ');
            const color = collectionColor(collection.name);
            btn.style.setProperty('--col-color', color);
            filtersContainer.appendChild(btn);
        });
        
        // Build tag filter buttons from MIPLIB metadata
        const skip = new Set(['benchmark', 'benchmark_suitable', 'easy', 'hard', 'open', 'no_solution']);
        const tagCounts = {};
        Object.values(miplibMeta).forEach(m => {
            if (m.tags) {
                m.tags.filter(t => !skip.has(t)).forEach(t => {
                    tagCounts[t] = (tagCounts[t] || 0) + 1;
                });
            }
        });
        const tagFiltersContainer = document.getElementById('tag-filters');
        Object.keys(tagCounts).sort().forEach(tag => {
            const btn = document.createElement('button');
            btn.className = 'tag-filter-btn';
            btn.dataset.tag = tag;
            btn.textContent = tag.replace(/_/g, ' ');
            const color = collectionColor('miplib_' + tag);
            btn.style.setProperty('--tag-color', color);
            tagFiltersContainer.appendChild(btn);
        });

        // Build constraint-type pills: pill count = number of instances that contain
        // at least one constraint of that type; sorted by that count (desc).
        const consTypeInstanceCounts = {};
        Object.values(consTypeCounts).forEach(counts => {
            Object.keys(counts).forEach(t => {
                if (counts[t] > 0) consTypeInstanceCounts[t] = (consTypeInstanceCounts[t] || 0) + 1;
            });
        });
        const consTypesSorted = Object.keys(consTypeInstanceCounts).sort((a, b) => consTypeInstanceCounts[b] - consTypeInstanceCounts[a]);
        const consTypeContainer = document.getElementById('cons-type-filters');
        consTypesSorted.forEach(type => {
            const btn = document.createElement('button');
            btn.className = 'cons-type-btn';
            btn.dataset.consType = type;
            btn.innerHTML = type + ' <span class="cons-type-count">' + formatNum(consTypeInstanceCounts[type]) + '</span>';
            consTypeContainer.appendChild(btn);
        });

        setupFilterButtons();
        setupTagFilterButtons();
        setupConsTypeButtons();
        bankStatus.classList.add('hidden');
        applyFilter();
    })
    .catch(err => {
        console.error(err);
        bankStatus.textContent = err.message || 'Failed to load instance data from GitHub.';
    });

    // Keyboard navigation for instance table
    var selectedRow = -1;

    function selectRow(idx) {
        var rows = bankBody.querySelectorAll('tr');
        if (rows.length === 0) return;
        // Deselect previous
        if (selectedRow >= 0 && selectedRow < rows.length) {
            rows[selectedRow].classList.remove('bank-row-selected');
        }
        // Clamp index
        selectedRow = Math.max(0, Math.min(idx, rows.length - 1));
        rows[selectedRow].classList.add('bank-row-selected');
        rows[selectedRow].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }

    document.addEventListener('keydown', function(e) {
        // Allow arrow keys and Enter even when search is focused
        if (e.key !== 'ArrowDown' && e.key !== 'ArrowUp' && e.key !== 'j' && e.key !== 'k' && e.key !== 'Enter') {
            var tag = document.activeElement && document.activeElement.tagName;
            if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
        }
        // j/k only when not in input
        if (e.key === 'j' || e.key === 'k') {
            var tag2 = document.activeElement && document.activeElement.tagName;
            if (tag2 === 'INPUT' || tag2 === 'TEXTAREA' || tag2 === 'SELECT') return;
        }

        var rows = bankBody.querySelectorAll('tr');
        if (rows.length === 0) return;

        if (e.key === 'ArrowDown' || e.key === 'j') {
            e.preventDefault();
            selectRow(selectedRow + 1);
        } else if (e.key === 'ArrowUp' || e.key === 'k') {
            e.preventDefault();
            selectRow(selectedRow - 1);
        } else if (e.key === 'Enter' && selectedRow >= 0 && selectedRow < rows.length) {
            var link = rows[selectedRow].querySelector('a');
            if (link) link.click();
        }
    });

    // Reset selection when table is re-rendered
    var origRenderTable = renderTable;
    renderTable = function(data) {
        selectedRow = -1;
        origRenderTable(data);
    };
    </script>
</body>
</html>
