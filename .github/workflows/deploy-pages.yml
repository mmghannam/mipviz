name: Deploy to GitHub Pages

on:
  push:
    branches: [master, dev]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          path: main

      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          path: dev-branch
        continue-on-error: true

      - name: Build site
        run: |
          mkdir -p _site
          cp -r main/static/* _site/
          if [ -d dev-branch/static ]; then
            mkdir -p _site/dev
            cp -r dev-branch/static/* _site/dev/
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
